Description: A dark Typora theme that offers relatively low contrast and less harm to eyes.

/* import font */
:root {
    --text-color: hsl(220, 1%, 66%);
    --text-color2: hsl(198, 4%, 64%);
    --meta-content-color: var(--code-color-orange2);
    --bg-color: hsl(240, 8%, 17%);

    --bg-color2: hsl(234, 8%, 16%);
    --bg-color-code: hsl(236, 8%, 18%);
    --line-color: #555;
    --link-color: #6497c2;

    /* Line height definition */
    --text-line-height: 1.61;
    --code-line-height: 1.42857143;
    --meta-line-height: 1.58;
    --quote-line-height: 1.8;
    --table-line-height: 1.75;

    /* table */
    --table-bg-color: hsl(240, 8%, 18%);
    --table-bg-darker-color: hsl(240, 8%, 16%);
    --table-border-color: #4e4e4e;

    --primary-color: rgb(131, 172, 199);
    --side-bar-bg-color: hsl(240, 8%, 15%);
    --active-file-text-color: inherit;
    --active-file-border-color: var(--primary-color);
    --active-file-bg-color: hsl(225, 10%, 14%);

    --control-text-color: #abaaa9;
    --primary-btn-border-color: var(--primary-color);
    --primary-btn-text-color: var(--primary-color);
    --window-border: 0 solid #0d1117;
    --item-hover-bg-color: hsl(225, 10%, 14%);
    --item-hover-text-color: var(--primary-color);
    --meta-content-color: var(--primary-color);
    --search-select-text-color: var(--primary-color);
    --control-text-color: var(--text-color);
    --control-text-hover-color: var(--text-color);
    --heading-char-color: var(--primary-color);
    --active-toggle-btn-color: #192133;
    --blur-text-color: rgba(200, 200, 200, 0.33);
    --rawblock-edit-panel-bd: var(--item-hover-bg-color) !important;
    --select-text-bg-color: rgba(53, 82, 116, 0.836) !important;
    --select-text-font-color: rgb(179, 179, 179) !important;
    --color-border-secondary: #21262d !important;

    /* highlight */
    --code-color-purple: #b189ce;
    --code-color-red: #c96268;
    --code-color-orange: rgb(202, 144, 110);
    --code-color-orange2: rgb(199, 163, 96);
    --code-color-gray: #696969;
    --code-color-blue: #6fa0df;
    --code-color-cyan: #90bbcc;
    --code-color-white: rgb(185, 185, 185);
    --code-color-yellow: #beaf64;

    /* scrollbar */
    --menu-divider-color: hsl(220, 16%, 29%);
    /* scrollbar color */
    --scrollbar-thumb-color: var(--menu-divider-color);
    --scrollbar-track-color: rgba(95, 97, 101, 0.3);

    --monospace: 'Fira Code', 'Consolas', '微软雅黑', monospace;
}

html,
body,
#write {
    background: var(--bg-color);
    font-family: sans-serif;
    font-weight: 400;
}

h1,
h2,
h3,
h4,
h5,
h6 {
    color: var(--text-color2);
}

    font-size: 18px;
    letter-spacing: 0.5px;
}

    border: 1.5px solid var(--line-color)
}

    color: var(--text-color2)
}

    color: var(--text-color);
}

.md-url {
    font-family: 'Consolas';
}

.md-inline-math script {
    color: var(--text-color);
}

#write {
    max-width: 1100px;
    text-align: left;
}

#write>h1:first-child {
    margin-top: 2.75rem;
}

    margin-top: 1.75rem;
}

    margin-top: 1rem;
}

    margin-top: 0.5rem;
}

    font-size: 2.3rem;
    line-height: 4rem;
    margin-top: 1.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 3px double var(--line-color)
}

h2 {
    /* font-weight: normal; */
    font-size: 2rem;
    line-height: 3rem;
    margin-top: 1.4rem;
    padding-bottom: 0.7rem;
    border-bottom: 2.7px double var(--line-color)
}

h3 {
    font-size: 1.8rem;
    padding-bottom: 0.6rem;
    border-bottom: 1.8px double var(--line-color)
}

h4 {
    font-size: 1.6rem;
}

h5 {
    font-size: 1.425rem;
}

h6 {
    font-size: 1.2rem;
}

p {
    color: var(--text-color);
    font-size: 1rem;
    line-height: var(--text-line-height);
    margin: 0 0 1.25rem;
}

#write>h3.md-focus:before {
    left: -1.875rem;
    top: 0.5rem;
    padding: 2px;
}

#write>h4.md-focus:before {
    left: -1.875rem;
    top: 0.3125rem;
    padding: 2px;
}

#write>h5.md-focus:before {
    left: -1.875rem;
    top: 0.25rem;
    padding: 2px;
}

#write>h6.md-focus:before {
    left: -1.875rem;
    top: .125rem;
    padding: 2px;
}

        margin-left: 1rem;

    }

    h1 {

    }

    }

    }

/* mark */

    background: none;
    color: var(--primary-color);
    font-weight: bold;
    border: 1.5px solid var(--primary-color);
    border-radius: 10px;
    padding: 0.07rem;
    padding-left: 0.27rem;
    padding-right: 0.27rem;
    margin-left: 0.25rem;

/* table */

    color: var(--text-color);
    margin-bottom: 20px
}

table tr th {
    font-weight: bold;
    background-color: var(--table-bg-darker-color);
    border-left: 1px solid var(--table-border-color);
    border-right: 1px solid var(--table-border-color);
    border-top: 1px solid var(--table-border-color);
    text-align: left;
    margin: 0;
    padding: 6px 13px;
}


table tr td {
    border-left: 1px solid var(--table-border-color);
    border-right: 1px solid var(--table-border-color);
    text-align: left;
    margin: 0;
    padding: 6px 13px;
}

table thead th {
    vertical-align: bottom
}

table tbody tr:nth-child(2n) {
    background-color: var(--table-bg-darker-color);
}

table tbody tr:nth-child(2n + 1) {
    background-color: var(--table-bg-color);
}

table caption+thead tr:first-child th,
table caption+thead tr:first-child td,
table colgroup+thead tr:first-child th,
table colgroup+thead tr:first-child td,
table thead:first-child tr:first-child th,
table thead:first-child tr:first-child td {
    border-top: 0
}

table tbody+tbody {
    border-top: 2px solid #ddd
}

.active-tab-files #info-panel-tab-file .info-panel-tab-border, .active-tab-outline #info-panel-tab-outline .info-panel-tab-border {
    height: 4px;
    background-color: var(--primary-color) !important;
}

code {
    color: var(--code-color-orange);
    background-color: var(--bg-color2);
    font-weight: medium;
    padding: 0.2rem;
}

code, .md-fences {
    padding: .3em;
    background: var(--bg-color-code);
    font-family: var(--monospace);
    /*border: 1px solid rgb(255, 0, 0);*/
    font-size: 0.9em;
    border-radius: 10px;
}

.md-fences {
    margin-left: 0.2em;
    margin-right: 0.2em;
    padding-left: 0.5em;
    padding-top: 0.7em;
    padding-bottom: 0.7em;
}


.task-list {
    padding-left: 0;
}

.task-list-item {
    padding-left: 0;
}

.task-list-item input {
    top: 3px;
}

.task-list-item input:before {
    content: "";
    display: inline-block;
    width: 1rem;
    height: 1rem;
    vertical-align: middle;
    text-align: center;
    border: none;
    background-color: var(--item-hover-bg-color) !important;
    margin-left: 0;
    margin-top: -1rem;
}

.task-list-item input:checked:before,
.task-list-item input[checked]:before {
    content: "\2713";
    font-size: 1.2125rem;
    line-height: .9375rem;
    margin-top: -1rem;
}

@media screen and (-webkit-min-device-pixel-ratio:0) and (min-resolution:.001dpcm) {

    .task-list-item input:before,
    .task-list-item input:checked:before,
    .task-list-item input[checked]:before {
        margin-top: -1rem;
    }
}

blockquote {
    background-color: var(--bg-color2);
    margin: 1.1rem 0 1.11111rem;
    padding: 1rem 1.11111rem 1rem 1.05556rem;
    border-left: 4px solid var(--primary-color);
    border-radius: 6px;
}

blockquote,
blockquote p {
    font-size: 0.95rem;
    line-height: var(--quote-line-height);
    color: var(--text-color2);
}

#write pre.md-meta-block {
    font-family: var(--monospace);
    min-height: 30px;
    background: var(--bg-color-code);
    padding: 1.2em;
    font-weight: medium;
    line-height: var(--meta-line-height);
    font-size: medium;
    margin-top: 1em;
    color: var(--text-color2);
    border-radius: 10px;
}

.MathJax_Display {
    margin-top: 0.5em;
    margin-bottom: 0;
}

.md-math-block {
    font-size: 1.1rem;
}

p.mathjax-block,
.mathjax-block {
    padding-bottom: 0;
}

.mathjax-block>.code-tooltip {
    bottom: 5px;
    box-shadow: none;
}

.md-rawblock-control:not(.md-rawblock-tooltip) {
    background: var(--bg-color-code);
    border-radius: 7px;
}

.md-rawblock-before {
    padding-top: 0.7ch;
}

.md-rawblock-after {
    padding-bottom: 0.7ch;
}

.md-image>.md-meta {
    color: var(--code-color-orange2);
    padding-left: 0.5em;
    padding-right: 0.5em;
}

.md-image>img {
    margin-top: 2px;
}

.md-image>.md-meta:first-of-type:before {
    padding-left: 4px;
}

#typora-source {
    color: #555;
}

/** ui for windows **/
#md-searchpanel {
    border-bottom: 1px solid #ccc;
}

#md-searchpanel .btn {
    border: 1px solid #ccc;
}

#md-notification:before {
    top: 14px;
}

#md-notification {
    background: var(--bg-color-code);
    padding-right: 20px;
}

#md-notification .btn {
    background: var(--bg-color2);
    border: none;
}

/* megamenu */

.megamenu-menu-panel .btn {
    border: 1px solid #ccc;
}

.megamenu-menu {
    background-color: var(--bg-color);
}

.megamenu-content {
    background: var(--bg-color2) !important;
}

.megamenu-opened header {
    background: var(--bg-color-code) !important;
}

#recent-file-panel tbody tr:nth-child(2n-1) {
    background-color: var(--table-bg-color);
}

#recent-file-panel-action-btn {
    background-color: var(--bg-color);
    border: 0.5px solid var(--table-border-color);
    border-radius: 5px;
}

#recent-file-panel-search-input {
    border-radius: 5px;
}

.long-btn {
    border-radius: 10px;
    border: 0.5px solid var(--table-border-color);
}

.export-detail, .export-items-list-control, .export-item.active {
    background-color: var(--bg-color2) !important;
}

/* TOC */
#write div.md-toc-tooltip {
    background-color: var(--bg-color2);
    color: var(--text-color);
    border-top: none;
    padding-left: 0.7em;
}

.md-toc {
    margin-left: 0;
    margin-right: 0;
}

.md-toc:focus .md-toc-content {
    border: solid 0.4px #999;
    border-color: var(--table-border-color);
}

.md-toc-content {
    border-radius: 10px;
    font-size: 0.9rem;
    padding-top: 0.7em;
    padding-bottom: 0.7em;
    background-color: var(--side-bar-bg-color);
}

/* scrollbar */
::-webkit-scrollbar {
    width: 7px;
    padding-right: 10px;
    background-color: rgba(0, 0, 0, 0);
}

/* scrollbar track */
::-webkit-scrollbar-track:hover {
    background-color: var(--scrollbar-track-color) !important;
    border-radius: 4px;
}

/* scrollbar thumb */
::-webkit-scrollbar-thumb,
::-webkit-scrollbar-thumb:active {
    background-color: var(--scrollbar-thumb-color) !important;
    border-radius: 4px;
}

/* footer */

.typora-sourceview-on #toggle-sourceview-btn {
    background: none;
}

footer.ty-footer {
    border-top: 0.5px solid var(--table-border-color);
}

/* 代码高亮部分 */

.cm-s-inner.CodeMirror {
    background-color: var(--bg-color-code);
    color: var(--code-color-white);
    font-weight: 400;
    font-size: 0.9rem !important;
    line-height: var(--code-line-height) !important;
    letter-spacing: 0 !important;

    background: var(--bg-color-code);
    color: #545454;
    border: none;
}

    padding-left: 0.7rem;
}

    font-family: 'Consolas', monospace !important;

    border-left: 1px solid var(--code-color-cyan) !important;
}

    background: rgba(97, 97, 97, 0.2) !important;
